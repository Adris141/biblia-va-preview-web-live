<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Biblia VA - Aplicación de lectura bíblica">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Biblia VA">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Biblia VA</title>
  <link rel="manifest" href="manifest.json">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    #app {
      width: 100%;
      height: 100%;
    }
    
    .app-loader {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #000;
      flex-direction: column;
    }
    
    .app-loader h1 {
      font-size: 36px;
      margin-bottom: 20px;
      font-weight: bold;
    }
    
    .app-loader p {
      font-size: 14px;
      color: #999;
      margin-bottom: 30px;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #0ea5e9;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-loader">
      <h1>BIBLIA VA</h1>
      <p>Cargando aplicación...</p>
      <div class="spinner"></div>
    </div>
  </div>

  <script>
    console.log('[BibliaVA] ✓ Page loaded');
    window.addEventListener('error', function(event) {
      console.error('[BibliaVA] ✗ Error:', event.message);
    });
    window.addEventListener('load', function() {
      console.log('[BibliaVA] ✓ Window loaded');
    });
  </script>
  
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
