<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Biblia VA - Aplicación de lectura bíblica">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Biblia VA">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Biblia VA</title>
  <link rel="manifest" href="manifest.json">
  
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #app-container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .loading {
      text-align: center;
      color: #fff;
    }
    .loading h1 {
      margin: 0 0 20px 0;
      font-size: 32px;
    }
    .loading p {
      margin: 10px 0;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div id="app-container">
    <div class="loading">
      <h1>BIBLIA VA</h1>
      <p>Cargando aplicación...</p>
    </div>
  </div>

  <script>
    console.log('[BibliaVA] Page loaded, starting Flutter app...');
    window.addEventListener('error', function(event) {
      console.error('[BibliaVA] Window error:', event.error);
      document.querySelector('.loading p').textContent = 'Error cargando la aplicación';
    });
  </script>
  
  <script src="flutter_bootstrap.js" async onload="console.log('[BibliaVA] flutter_bootstrap.js loaded')" onerror="console.error('[BibliaVA] Error loading flutter_bootstrap.js')"></script>
</body>
</html>
